name: 🗺️ Generate Wilayah API

on:
  # Otomatis tiap tanggal 1 jam 02:00 UTC (untuk update data bulanan)
  schedule:
    - cron: '0 2 1 * *'

  # Trigger manual dari GitHub Actions tab
  workflow_dispatch:
    inputs:
      force_download:
        description: 'Force re-download (bypass cache)'
        required: false
        default: 'false'
        type: boolean
      source:
        description: 'Data source'
        required: false
        default: 'sql'
        type: choice
        options:
          - sql
          - emsifa

  # Trigger saat ada push ke scripts/
  push:
    branches:
      - main
      - master
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  generate:
    name: Generate Static API
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      # ── Cache data source ─────────────────────────────────────────
      - name: 💾 Cache downloaded data
        uses: actions/cache@v4
        with:
          path: .cache/
          key: wilayah-data-${{ runner.os }}-${{ hashFiles('scripts/generate.py') }}
          restore-keys: |
            wilayah-data-${{ runner.os }}-

      # ── Generate ──────────────────────────────────────────────────
      - name: 🔄 Generate API files
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force_download }}" == "true" ]; then
            FORCE="--force"
          fi
          SOURCE="${{ github.event.inputs.source || 'sql' }}"
          python scripts/generate.py --clean $FORCE --source $SOURCE

      # ── Validate ──────────────────────────────────────────────────
      - name: ✅ Validate output
        run: python scripts/validate.py

      # ── Stats ─────────────────────────────────────────────────────
      - name: 📊 Show stats
        run: |
          echo "=== API Stats ==="
          echo "Provinces : $(jq length api/provinces.json)"
          echo "Regencies : $(find api/regencies -name '*.json' | wc -l) files"
          echo "Districts : $(find api/districts -name '*.json' | wc -l) files"
          echo "Villages  : $(find api/villages  -name '*.json' | wc -l) files"
          echo "Total size: $(du -sh api/ | cut -f1)"
          echo ""
          cat api/meta.json

      # ── Commit ────────────────────────────────────────────────────
      - name: 📤 Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            data: update wilayah data [skip ci]

            Generated by GitHub Actions — $(date -u +"%Y-%m-%d %H:%M UTC")
          file_pattern: 'api/**'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          skip_dirty_check: false

      # ── Summary ───────────────────────────────────────────────────
      - name: 📋 Job Summary
        if: always()
        run: |
          echo "## 🗺️ Wilayah API Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f api/meta.json ]; then
            echo "### Stats" >> $GITHUB_STEP_SUMMARY
            echo "| Level | Jumlah |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Provinsi | $(jq '.total.provinces' api/meta.json) |" >> $GITHUB_STEP_SUMMARY
            echo "| Kab/Kota | $(jq '.total.regencies' api/meta.json) |" >> $GITHUB_STEP_SUMMARY
            echo "| Kecamatan | $(jq '.total.districts' api/meta.json) |" >> $GITHUB_STEP_SUMMARY
            echo "| Kel/Desa | $(jq '.total.villages' api/meta.json) |" >> $GITHUB_STEP_SUMMARY
          fi
